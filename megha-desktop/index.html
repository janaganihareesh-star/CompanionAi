<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CloserAI - Desktop</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: rgba(20, 20, 30, 0.95);
      color: white;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #4ade80;
    }
    .header {
      background: rgba(0,0,0,0.5);
      padding: 10px;
      text-align: center;
      font-weight: bold;
      -webkit-app-region: drag;
    }
    .chat {
      padding: 20px;
      display: flex;
      flex-direction: column;
      height: 480px;
      overflow-y: auto;
    }
    .input-box {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 10px;
      background: #111;
      box-sizing: border-box;
    }
    input {
      width: calc(100% - 20px);
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #333;
      background: #222;
      color: white;
      outline: none;
    }
  </style>
</head>
<body>
  <div class="header">CloserAI - Desktop Agent</div>
  <div class="chat">
    <p style="color: #aaa;">Press Ctrl+Space to toggle this window.</p>
    <p>Hi, I am CloserAI running natively on your system. How can I help you today?</p>
  </div>
  <div class="input-box">
    <input type="text" placeholder="Type a message to CloserAI..." />
  </div>
</body>
</html>
